name: registry-sync
description: Sync container images between registries

inputs:
  src:
    description: Single source image
    required: false

  images:
    description: Multiple images list
    required: false

  file:
    description: Image list file
    required: false

  dst:
    description: Destination registry
    required: true

  platform:
    description: Target platform
    required: false
    default: linux/amd64

  concurrency:
    description: Worker concurrency
    required: false
    default: "4"

  retries:
    description: Retry attempts
    required: false
    default: "3"


runs:
  using: composite

  steps:
    - name: Install registry-sync
      shell: bash
      run: |
        set -e

        chmod +x "$GITHUB_ACTION_PATH/bin/registry-sync"
        sudo cp "$GITHUB_ACTION_PATH/bin/registry-sync" /usr/local/bin/registry-sync


    - name: Prepare images file
      if: inputs.images != ''
      shell: bash
      run: |
        set -e

        printf "%s\n" "${{ inputs.images }}" > /tmp/images.txt

        echo "Prepared images:"
        cat /tmp/images.txt


    - name: Run registry-sync
      shell: bash
      run: |
        set -e

        if [ -n "${{ inputs.src }}" ]; then

          echo "Mode: single image"

          registry-sync sync \
            --src "${{ inputs.src }}" \
            --dst "${{ inputs.dst }}" \
            --platform "${{ inputs.platform }}" \
            --concurrency "${{ inputs.concurrency }}" \
            --retries "${{ inputs.retries }}"


        elif [ -n "${{ inputs.file }}" ]; then

          echo "Mode: image file"

          registry-sync sync \
            --file "${{ inputs.file }}" \
            --dst "${{ inputs.dst }}" \
            --platform "${{ inputs.platform }}" \
            --concurrency "${{ inputs.concurrency }}" \
            --retries "${{ inputs.retries }}"


        elif [ -n "${{ inputs.images }}" ]; then

          echo "Mode: inline images"

          registry-sync sync \
            --file /tmp/images.txt \
            --dst "${{ inputs.dst }}" \
            --platform "${{ inputs.platform }}" \
            --concurrency "${{ inputs.concurrency }}" \
            --retries "${{ inputs.retries }}"


        else

          echo "Error: no images specified"
          echo "Use one of:"
          echo "  src:"
          echo "  file:"
          echo "  images:"
          exit 1

        fi