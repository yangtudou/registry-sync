name: registry-sync
description: Sync container images between registries
branding:
  icon: 'refresh-cw'
  color: 'blue'

inputs:
  src:
    description: 'Single source image'
    required: false
  images:
    description: 'Multiple images list'
    required: false
  file:
    description: 'Image list file'
    required: false
  dst:
    description: 'Destination registry'
    required: true
  platform:
    description: 'Target platform'
    required: false
    default: 'linux/amd64'
  concurrency:
    description: 'Worker concurrency'
    required: false
    default: '4'
  retries:
    description: 'Retry attempts'
    required: false
    default: '3'


outputs:
  sync-mode:
    description: 'The mode used for syncing (single, batch, inline)'
    value: ${{ steps.sync-step.outputs.MODE }}


runs:
  using: composite
  steps:
    - name: Setup registry-sync
      shell: bash
      run: |
        echo "::group::🔧 Setup Executable"
        chmod +x "$GITHUB_ACTION_PATH/bin/registry-sync"
        echo "$GITHUB_ACTION_PATH/bin" >> $GITHUB_PATH
        
        if ! registry-sync --help > /dev/null 2>&1; then
          echo "::warning title=Setup Issue::Failed to verify registry-sync execution. Binary might be corrupt or incompatible."
        fi
        echo "::endgroup::"

    - name: Execute registry-sync
      id: sync-step
      shell: bash
      env:
        INPUT_SRC: ${{ inputs.src }}
        INPUT_IMAGES: ${{ inputs.images }}
        INPUT_FILE: ${{ inputs.file }}
        INPUT_DST: ${{ inputs.dst }}
        INPUT_PLATFORM: ${{ inputs.platform }}
        INPUT_CONCURRENCY: ${{ inputs.concurrency }}
        INPUT_RETRIES: ${{ inputs.retries }}
      run: |
        set -euo pipefail

        echo "::group::🚀 Executing Sync"
        
        ARGS=(
          "sync"
          "--dst" "$INPUT_DST"
          "--platform" "$INPUT_PLATFORM"
          "--concurrency" "$INPUT_CONCURRENCY"
          "--retries" "$INPUT_RETRIES"
        )

        if [ -n "$INPUT_SRC" ]; then
          echo "MODE=single" >> "$GITHUB_OUTPUT"
          echo "Mode: Single image ($INPUT_SRC)"
          registry-sync "${ARGS[@]}" --src "$INPUT_SRC"

        elif [ -n "$INPUT_FILE" ]; then
          echo "MODE=batch" >> "$GITHUB_OUTPUT"
          echo "Mode: Image file ($INPUT_FILE)"
          registry-sync "${ARGS[@]}" --file "$INPUT_FILE"

        elif [ -n "$INPUT_IMAGES" ]; then
          echo "MODE=inline" >> "$GITHUB_OUTPUT"
          echo "Mode: Inline images"
          printf "%s\n" "$INPUT_IMAGES" > /tmp/images.txt
          registry-sync "${ARGS[@]}" --file /tmp/images.txt

        else
          echo "::error title=Missing Input Parameters::You must specify one of: src, file, or images."
          echo "::endgroup::"
          exit 1
        fi
        
        echo "::endgroup::"
        
        echo "::notice title=Sync Success::🎉 Registry sync completed successfully!"
