dest:
  aliyun:
    registry: ${ALIYUN_REGISTRY_DOMAIN}
    namespace: ${ALIYUN_REGISTRY_SPACE_NAME}
    flatten: true
    auth:
      username: ${ALIYUN_USERNAME}
      password: ${ALIYUN_PASSWORD}

# 全局指定
sync:
  - aliyun
platform:
  - linux/amd64

sources:
  docker.io:
    images:
      cloudflare/cloudflared:
      gdy666/lucky: v2
      joxit/docker-registry-ui: main
      library/registry: 3
      library/traefik: v3.7
      louislam/dockge: 1
      louislam/uptime-kuma: 2
      metacubex/mihomo: latest
      tecnativa/docker-socket-proxy: master

  ghcr.io:
    images:
      dani-garcia/vaultwarden:
      finb/bark-server:
      hacdias/webdav:
      jellyfin/jellyfin:
      sagernet/sing-box: [latest, latest-testing]
      tailscale/tailscale: stable
      usememos/memos: 0.29.1
      userdocs/iperf3-static: